[tool.taskipy.tasks]

# Run application
start = "python app/src/main.py"

# Development server
dev = "uvicorn app.src.main:app --reload"

# Run tests
test = "pytest"

# Format code
format = "black ."

# Lint code
lint = "flake8 ."

# Build package
build = "python scripts/build.py"

# Create git tag and push
release = "python scripts/release.py"

version = "1.0.0"

# Sync version
version_sync = "python scripts/version_sync.py"

# 2. Runs your smart environment script to install dependencies or sync new packages
setup = "powershell -ExecutionPolicy Bypass -File ./setup_venv.ps1"
